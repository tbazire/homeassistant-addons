#
# Dependabot configuration. Keeps Go modules and GitHub Actions up to date.
# We do NOT enable Docker base image updates here: HA base images are versioned
# together with the Alpine suffix and are bumped manually after testing.

version: 2

updates:
  # Go modules for eebusd (vendored)
  - package-ecosystem: "gomod"
    directory: "/eebus_bridge/eebusd"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
      - "eebusd"
    commit-message:
      prefix: "chore(eebusd)"

  # Go modules for eebus-bridge
  - package-ecosystem: "gomod"
    directory: "/eebus_bridge/bridge"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
      - "bridge"
    commit-message:
      prefix: "chore(bridge)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"

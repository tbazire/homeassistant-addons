      # shellcheck ONLY our scripts. The vendored x/sys/unix package ships
      # shell scripts (mkall.sh, mkerrors.sh) that are not ours and emit
      # many warnings. We explicitly enumerate our own script paths.
#      - name: Run shellcheck

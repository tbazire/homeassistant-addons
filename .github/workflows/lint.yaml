#
# Lint & validation workflow. Runs on every PR and on pushes to main.
# Fast feedback loop: does not build the Docker image (that's build.yaml).
#
# Checks performed:
#   - Go: gofmt + go vet + go test on eebusd AND eebus-bridge.
#   - Shell: shellcheck on run.sh.
#   - YAML: yamllint on config/translations/workflows.
#   - Add-on schema: python tests/test_config_validation.py asserts the
#     security posture of config.yaml (no privileged, init:false, etc.).

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go vet & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - eebusd
          - bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: |
            eebus_bridge/${{ matrix.component }}/go.sum

      - name: Download modules
        working-directory: eebus_bridge/${{ matrix.component }}
        run: go mod download

      - name: gofmt
        working-directory: eebus_bridge/${{ matrix.component }}
        run: |
          out="$(gofmt -l .)"
          if [ -n "${out}" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "${out}"
            exit 1
          fi

      - name: go vet
        working-directory: eebus_bridge/${{ matrix.component }}
        run: go vet ./...

      - name: go test
        working-directory: eebus_bridge/${{ matrix.component }}
        run: go test -race ./...

  license-headers:
    name: SPDX license headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SPDX headers on source files
        run: |
          set -euo pipefail
          missing=0
          # Scope: ONLY our own files. Third-party code is out of scope for our
          # license-header policy:
          #   - eebus_bridge/eebus-go/   : upstream github.com/enbility/eebus-go (MIT)
          #   - eebus_bridge/eebusd/vendor/ : Go module cache (mixed OSS licenses)
          while IFS= read -r f; do
            if ! grep -q "SPDX-License-Identifier: Apache-2.0" "$f"; then
              echo "::error file=${f}::missing SPDX-License-Identifier header"
              missing=1
            fi
          done < <(find eebus_bridge -type f \( -name '*.go' -o -name '*.sh' -o -name '*.py' \) \
                       -not -path 'eebus_bridge/eebus-go/*' \
                       -not -path '*/vendor/*')
          while IFS= read -r f; do
            if ! grep -q "SPDX-License-Identifier: Apache-2.0" "$f"; then
              echo "::error file=${f}::missing SPDX-License-Identifier header"
              missing=1
            fi
          done < <(find . -type f -name '*.yaml' \
                       -not -path './.git/*' \
                       -not -path './eebus_bridge/eebus-go/*' \
                       -not -path '*/vendor/*')
          exit $missing

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          additional_paths: eebus_bridge/run.sh

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install --user yamllint

      # Scope: only YAML files we own. The vendored eebus-go/ subtree AND any
      # vendored Go dependencies (vendor/) are third-party: their YAML configs
      # (.golangci.yml, .mockery.yaml, CI workflows) do not follow our house
      # style and must not be linted.
      - name: Run yamllint
        run: |
          set -euo pipefail
          # Build the list of YAML files to lint, excluding third-party subtrees.
          mapfile -t files < <(find . -type f -name '*.yaml' \
                                    -not -path './.git/*' \
                                    -not -path './eebus_bridge/eebus-go/*' \
                                    -not -path '*/vendor/*' \
                                    | sort)
          echo "Linting ${#files[@]} YAML file(s):"
          printf '  %s\n' "${files[@]}"
          # No --strict: yamllint exits non-zero only on [error]-level findings.
          # [warning]-level (e.g. document-start "---" missing) is printed but
          # does NOT fail the job. This matches .yamllint.yaml where line-length
          # is explicitly downgraded to warning.
          yamllint -f parsable -c .yamllint.yaml "${files[@]}"

  addon-config:
    name: Add-on config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run config validation tests
        working-directory: eebus_bridge/tests
        run: python test_config_validation.py

#
# Lint & validation workflow. Runs on every PR and on pushes to main.
# Fast feedback loop: does not build the Docker image (that's build.yaml).
#
# Checks performed:
#   - Go: gofmt + go vet + go test on eebusd AND eebus-bridge.
#   - Shell: shellcheck on our own scripts (NOT vendored ones).
#   - YAML: yamllint on our own YAML configs (NOT vendored ones).
#   - SPDX: Apache-2.0 header present on our own source files only.
#   - Add-on schema: python tests/test_config_validation.py asserts the
#     security posture of config.yaml (no privileged, init:false, etc.).
#
# IMPORTANT scope rule across all jobs: the eebus-go/ subtree (vendored copy
# of upstream github.com/enbility/eebus-go, MIT) and the Go module cache
# (eebusd/vendor/) are THIRD-PARTY code. They are excluded from every check
# that enforces our house style (gofmt, SPDX, yamllint, shellcheck).

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go vet & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - eebusd
          - bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: |
            eebus_bridge/${{ matrix.component }}/go.sum

      - name: Download modules
        working-directory: eebus_bridge/${{ matrix.component }}
        run: go mod download

      # gofmt only on OUR Go files. The eebusd module ships a vendor/ tree
      # whose files are frozen upstream and are NOT subject to our formatting
      # policy. Scanning them would surface dozens of false positives and
      # block CI for code we do not own.
      - name: gofmt
        working-directory: eebus_bridge/${{ matrix.component }}
        run: |
          set -euo pipefail
          # Build the list of our own .go files (excluding vendor/).
          mapfile -t files < <(find . -type f -name '*.go' -not -path './vendor/*')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Go files to format-check."
            exit 0
          fi
          out="$(gofmt -l "${files[@]}")"
          if [ -n "${out}" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "${out}"
            exit 1
          fi

      - name: go vet
        working-directory: eebus_bridge/${{ matrix.component }}
        run: go vet ./...

      - name: go test
        working-directory: eebus_bridge/${{ matrix.component }}
        run: go test -race ./...

  license-headers:
    name: SPDX license headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SPDX headers on source files
        run: |
          set -euo pipefail
          missing=0
          # Scope: ONLY our own files. Third-party code is out of scope for
          # our license-header policy:
          #   - eebus_bridge/eebus-go/    : upstream github.com/enbility/eebus-go (MIT)
          #   - eebus_bridge/eebusd/vendor/: Go module cache (mixed OSS licenses)
          # We list candidates into a file, then iterate. Using a temp file
          # avoids any process-substitution edge case and makes the offending
          # path print unambiguously when a header is missing.
          tmp="$(mktemp)"
          find eebus_bridge -type f \( -name '*.go' -o -name '*.sh' -o -name '*.py' \) \
                             -not -path 'eebus_bridge/eebus-go/*' \
                             -not -path 'eebus_bridge/eebusd/*' \
                             -not -path '*/vendor/*' > "${tmp}"
          find . -type f -name '*.yaml' \
                 -not -path './.git/*' \
                 -not -path './eebus_bridge/eebus-go/*' \
                 -not -path 'eebus_bridge/eebusd/*' \
                 -not -path '*/vendor/*' >> "${tmp}"
          echo "Scoped files: $(wc -l < "${tmp}")"
          while IFS= read -r f; do
            [ -z "${f}" ] && continue
            if ! grep -q "SPDX-License-Identifier: Apache-2.0" "${f}"; then
              echo "ERROR: missing SPDX-License-Identifier in: ${f}"
              missing=1
            fi
          done < "${tmp}"
          rm -f "${tmp}"
          exit "${missing}"


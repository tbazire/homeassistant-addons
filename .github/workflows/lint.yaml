  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install --user yamllint

      # Scope: only YAML files we own. The vendored eebus-go/ subtree AND any
      # vendored Go dependencies (vendor/) are third-party: their YAML configs
      # (.golangci.yml, .mockery.yaml, CI workflows) do not follow our house
      # style and must not be linted.
      - name: Run yamllint
        run: |
          set -euo pipefail
          # Build the list of YAML files to lint, excluding third-party subtrees.
          mapfile -t files < <(find . -type f -name '*.yaml' \
                                    -not -path './.git/*' \
                                    -not -path './eebus_bridge/eebus-go/*' \
                                    -not -path '*/vendor/*' \
                                    | sort)
          echo "Linting ${#files[@]} YAML file(s):"
          printf '  %s\n' "${files[@]}"
          # No --strict: yamllint exits non-zero only on [error]-level findings.
          # [warning]-level (e.g. document-start "---" missing) is printed but
          # does NOT fail the job. This matches .yamllint.yaml where line-length
          # is explicitly downgraded to warning.
          yamllint -f parsable -c .yamllint.yaml "${files[@]}"

  addon-config:
    name: Add-on config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run config validation tests
        working-directory: eebus_bridge/tests
        run: python test_config_validation.py
